<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon-2023q4.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Documents</div>
    <ul id="docList"></ul>
    <button onclick="createNewDoc()" class="win7-btn blue" style="width:100%; margin-top:10px;">New Document</button>
</div>

<div class="main-content">
    <div class="toolbar aero">
        <select id="fontName" onchange="format('fontName', this.value)" class="win7-input">
            <option value="Arial">Arial</option>
            <option value="Courier New">Courier New</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>

        <input type="number" id="fontSizeInput" value="3" min="1" max="7" onchange="format('fontSize', this.value)" class="win7-input" style="width:40px;">

        <div class="divider"></div>

        <button id="btn-bold" onmousedown="event.preventDefault(); format('bold')">B</button>
        <button id="btn-italic" onmousedown="event.preventDefault(); format('italic')">I</button>
        <button id="btn-underline" onmousedown="event.preventDefault(); format('underline')">U</button>
        
        <div class="divider"></div>
        
        <button onmousedown="event.preventDefault(); undo()">Undo</button>
        <button onmousedown="event.preventDefault(); redo()">Redo</button>
        
        <div class="divider"></div>
        
        <label>Color:</label>
        <input type="color" id="colorPicker" oninput="format('foreColor', this.value)" onmousedown="focusEditor()">

        <div class="divider"></div>

        <input type="file" id="imageUpload" style="display:none;" accept="image/*">
        <button onmousedown="event.preventDefault(); triggerUpload()">Upload Image</button>
        
        <div class="divider"></div>

        <button id="drawBtn" onmousedown="event.preventDefault(); setDrawMode('draw')">Draw</button>
        <button id="eraseBtn" onmousedown="event.preventDefault(); setDrawMode('erase')">Eraser</button>
        <button id="offBtn" class="active" onmousedown="event.preventDefault(); setDrawMode('off')">Text Mode</button>
        
        <div class="divider"></div>

        <button onclick="addPage()" class="win7-btn">Add Page</button>
        <button onclick="saveDoc()" class="win7-btn blue">Save Changes</button>
    </div>

    <div id="pages-container"></div>

    <div class="status-bar">
        <span id="page-count-display">Pages: 1</span>
        <span id="current-doc-name">Editing: Untitled Document</span>
        <span id="save-status">Saved</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
